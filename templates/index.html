<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monky Sound Pro</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="bgCanvas"></canvas>
    <div id="processingBanner" class="processing-banner">
        <div class="banner-content">
            <div class="banner-spinner"></div>
            <div class="banner-text">
                <span class="banner-title">🎛️ PROCESSING</span>
                <div class="banner-progress"><div class="banner-progress-bar" id="progressBar"></div></div>
                <span class="banner-status" id="statusText">Working...</span>
            </div>
        </div>
    </div>
    <div class="app-container">
        <header class="main-header glass">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">🎹</span>
                    <span class="logo-text">MONKY<span class="logo-highlight">SOUND</span></span>
                    <span class="logo-badge">PRO</span>
                </div>
                <nav class="main-nav">
                    <button class="nav-btn active" data-tab="studio">🎛️ Studio</button>
                    <button class="nav-btn" data-tab="piano">🎹 Piano</button>
                    <button class="nav-btn" data-tab="sequencer">🥁 Sequencer</button>
                    <button class="nav-btn" data-tab="lyrics">📝 Lyrics</button>
                    <button class="nav-btn" data-tab="library">📚 Library</button>
                </nav>
                <div class="header-actions">
                    <span class="status-dot online"></span>
                    <span class="status-text">Live</span>
                </div>
            </div>
        </header>
        <main class="main-content">
            <section id="tab-studio" class="tab-content active">
                <div class="studio-layout">
                    <div class="studio-visualizer glass">
                        <div class="visualizer-container">
                            <canvas id="waveformCanvas"></canvas>
                            <div class="visualizer-controls">
                                <button id="playBtn" class="ctrl-btn play">▶</button>
                                <button id="pauseBtn" class="ctrl-btn pause" style="display:none;">⏸</button>
                                <button id="stopBtn" class="ctrl-btn stop">⏹</button>
                                <input type="range" id="seekSlider" class="seek-slider" min="0" max="100" value="0">
                                <span id="timeDisplay" class="time-display">0:00 / 0:00</span>
                                <input type="range" id="volumeSlider" class="volume-slider" min="0" max="100" value="80">
                                <span class="volume-icon">🔊</span>
                            </div>
                        </div>
                    </div>
                    <div class="studio-effects glass">
                        <h3 class="panel-title">🎛️ EFFECTS CHAIN</h3>
                        <div class="effects-grid" id="effectsGrid"></div>
                        <div class="effects-actions">
                            <button id="applyEffectsBtn" class="btn-primary glow">✨ Apply</button>
                            <button id="resetEffectsBtn" class="btn-secondary">↺ Reset</button>
                            <button id="downloadBtn" class="btn-success">⬇️ Download</button>
                        </div>
                        <div class="translation-section" style="margin-top:12px;">
                            <h4 style="font-size:13px;color:var(--text-secondary);">🗣️ Voice Translate</h4>
                            <div class="translation-grid" id="translationGrid"></div>
                            <button id="translateBtn" class="btn-purple glow" style="margin-top:8px;">🌀 Transform</button>
                        </div>
                    </div>
                </div>
            </section>
            <section id="tab-piano" class="tab-content">
                <div class="piano-container glass">
                    <h3 class="panel-title">🎹 Virtual Piano</h3>
                    <div class="piano-controls">
                        <button id="recordPianoBtn" class="btn-secondary">⏺ Record</button>
                        <button id="stopPianoBtn" class="btn-secondary" style="display:none;">⏹ Stop</button>
                        <button id="playPianoBtn" class="btn-primary">▶ Play Recording</button>
                        <button id="clearPianoBtn" class="btn-secondary">🗑️ Clear</button>
                    </div>
                    <div class="piano-keyboard" id="pianoKeyboard"></div>
                    <div class="piano-notes-display" id="pianoNotesDisplay">
                        <span style="color:var(--text-secondary);">🎵 Play some notes...</span>
                    </div>
                </div>
            </section>
            <section id="tab-sequencer" class="tab-content">
                <div class="sequencer-container glass">
                    <h3 class="panel-title">🥁 Step Sequencer</h3>
                    <div class="sequencer-controls">
                        <button id="playSeqBtn" class="btn-primary">▶ Play</button>
                        <button id="stopSeqBtn" class="btn-secondary">⏹ Stop</button>
                        <button id="clearSeqBtn" class="btn-secondary">🗑️ Clear</button>
                        <label style="color:var(--text-secondary);font-size:13px;">BPM: <input type="number" id="bpmInput" value="120" min="60" max="200" style="width:60px;background:var(--bg-primary);color:#fff;border:1px solid var(--border-glow);border-radius:4px;padding:4px;"></label>
                        <label style="color:var(--text-secondary);font-size:13px;">Swing: <input type="range" id="swingSlider" min="0" max="100" value="50" style="width:80px;"></label>
                    </div>
                    <div class="sequencer-grid" id="sequencerGrid"></div>
                    <div class="sequencer-instruments">
                        <span style="color:var(--text-secondary);font-size:12px;">Instruments:</span>
                        <button class="inst-btn active" data-inst="kick">🥁 Kick</button>
                        <button class="inst-btn" data-inst="snare">🥁 Snare</button>
                        <button class="inst-btn" data-inst="hihat">🎵 Hi-hat</button>
                        <button class="inst-btn" data-inst="clap">👏 Clap</button>
                    </div>
                </div>
            </section>
            <section id="tab-lyrics" class="tab-content">
                <div class="lyrics-container glass">
                    <h3 class="panel-title">📝 Lyrics & Vocal Generation</h3>
                    <textarea id="lyricsInput" placeholder="Paste your lyrics here..." rows="6" style="width:100%;background:var(--bg-primary);color:var(--text-primary);border:1px solid var(--border-glow);border-radius:8px;padding:12px;font-size:14px;resize:vertical;"></textarea>
                    <div style="display:flex;gap:12px;margin-top:12px;flex-wrap:wrap;">
                        <select id="voiceStyleSelect" style="background:var(--bg-primary);color:var(--text-primary);border:1px solid var(--border-glow);border-radius:8px;padding:8px 12px;">
                            <option value="demonic">👹 Demonic</option>
                            <option value="robot">🤖 Robot</option>
                            <option value="angelic">😇 Angelic</option>
                            <option value="monster">👾 Monster</option>
                            <option value="chipmunk">🐿️ Chipmunk</option>
                            <option value="deep">🌊 Deep</option>
                        </select>
                        <button id="generateVoiceBtn" class="btn-purple glow">🎤 Generate Voice</button>
                        <button id="playVoiceBtn" class="btn-primary" style="display:none;">▶ Play</button>
                        <button id="downloadVoiceBtn" class="btn-success" style="display:none;">⬇️ Download</button>
                    </div>
                    <div id="lyricsStatus" style="margin-top:10px;color:var(--text-secondary);font-size:14px;"></div>
                    <div id="lyricsPreview" style="margin-top:12px;padding:12px;background:var(--bg-primary);border-radius:8px;border:1px solid var(--border-glow);min-height:60px;color:var(--text-secondary);font-style:italic;display:none;"></div>
                </div>
            </section>
            <section id="tab-library" class="tab-content">
                <div class="library-section glass">
                    <div class="library-header">
                        <h3 class="panel-title">📚 Audio Library</h3>
                        <button id="refreshLibraryBtn" class="btn-small">🔄 Refresh</button>
                    </div>
                    <div class="library-grid" id="libraryGrid">
                        <div class="library-empty"><span>🎵</span><p>No files yet.</p></div>
                    </div>
                </div>
            </section>
        </main>
        <footer class="main-footer glass">
            <div class="footer-content">
                <span>🎵 Monky Sound Pro © 2026</span>
                <span class="footer-divider">|</span>
                <span>⚡ Built for creators</span>
                <span class="footer-divider">|</span>
                <span class="footer-version">v3.0.0</span>
            </div>
        </footer>
    </div>
    <audio id="audioPlayer" style="display:none;"></audio>
    <script src="/js/script.js"></script>
</body>
</html>
