<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Monky Sound Pro V2</title><link rel="stylesheet" href="/css/style.css"><link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet"><script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script></head><body><div id="app"><header class="glass"><div class="logo">🎶 MONKY<span>SOUND</span> V2</div><nav><button class="active" data-tab="studio">Studio</button><button data-tab="piano">Piano</button><button data-tab="sequencer">Sequencer</button><button data-tab="composer">Composer</button><button data-tab="library">Library</button></nav><div class="status">● Live</div></header><main><section id="studio" class="active"><h2>Studio</h2><div id="controls"><button id="play">▶</button><button id="pause" style="display:none">⏸</button><button id="stop">⏹</button><input type="range" id="seek" value="0"><span id="time">0:00 / 0:00</span><input type="range" id="volume" value="80"><span>🔊</span></div><div id="waveform"><canvas id="waveCanvas"></canvas></div><div id="effects"><h3>Effects</h3><div id="effectList"></div><button id="apply">Apply</button><button id="reset">Reset</button><button id="download">Download</button></div></section><section id="piano"><h2>Virtual Piano</h2><div id="pianoKeys"></div><button id="recordPiano">⏺ Record</button><button id="playPiano">▶ Play</button><button id="clearPiano">🗑️ Clear</button><div id="pianoNotes"></div></section><section id="sequencer"><h2>Step Sequencer</h2><div id="seqControls"><button id="playSeq">▶ Play</button><button id="stopSeq">⏹ Stop</button><button id="clearSeq">🗑️ Clear</button><label>BPM: <input type="number" id="bpm" value="120"></label><label>Swing: <input type="range" id="swing" value="50"></label></div><div id="seqGrid"></div><div id="seqInstruments"><button class="inst active" data-inst="kick">Kick</button><button class="inst" data-inst="snare">Snare</button><button class="inst" data-inst="hihat">Hi-hat</button><button class="inst" data-inst="clap">Clap</button></div></section><section id="composer"><h2>🎤 Song Composer</h2><textarea id="composerLyrics" rows="6" placeholder="Paste your lyrics here..."></textarea><div><select id="composerStyle"><option value="pop">Pop</option><option value="rock">Rock</option><option value="electronic">Electronic</option><option value="ballad">Ballad</option></select><select id="composerVoice"><option value="female">Female</option><option value="male">Male</option><option value="robot">Robot</option></select><button id="composerGenerate">🎶 Generate Song</button></div><div id="composerStatus"></div><canvas id="composerWaveform" style="width:100%;height:80px;border-radius:8px;background:#12121f;margin-top:10px;"></canvas></section><section id="library"><h2>Library</h2><button id="refreshLib">🔄 Refresh</button><div id="fileList"></div></section></main><footer>Monky Sound Pro V2 © 2026</footer></div><script src="/js/script.js"></script></body></html>
